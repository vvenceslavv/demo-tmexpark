<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetMarker 360 - Demo T-MEXPARK</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
        #panorama-viewer { width: 100%; height: 100%; background: #000; }
        .branding-badge { position: absolute; top: 20px; left: 20px; background: rgba(13, 44, 84, 0.95); color: white; padding: 12px 20px; border-radius: 5px; border-left: 4px solid #c29438; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .branding-badge h1 { margin: 0; font-size: 16px; letter-spacing: 0.5px; }
        .branding-badge p { margin: 3px 0 0 0; font-size: 11px; color: #cbd5e0; }
    </style>
</head>
<body>

    <div class="branding-badge">
        <h1>NETMARKER 360</h1>
        <p>Recorrido Virtual 200m // NETVALLE</p>
    </div>

    <div id="panorama-viewer"></div>

    <script>
        fetch('data/recorrido.json')
            .then(response => response.json())
            .then(config => pannellum.viewer('panorama-viewer', config))
            .catch(err => console.error('Error al cargar la telemetría:', err));
    </script>
</body>
</html>
